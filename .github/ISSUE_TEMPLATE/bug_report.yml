name: Bug report
description: Something in coverage-tracker isn't working as expected.
labels: ['bug']
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: What did you do, step by step?
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: worker-version
    attributes:
      label: Worker version / commit
      description: The `version` field in `package.json`, or the commit SHA you deployed.
    validations:
      required: false

  - type: dropdown
    id: cloudflare-plan
    attributes:
      label: Cloudflare plan
      options:
        - Free
        - Paid (Workers/D1)
        - Not sure
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Output from `wrangler tail`, browser console, or CI, if applicable.
      render: shell
    validations:
      required: false
